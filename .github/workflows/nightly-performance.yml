name: nightly-performance

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      read_repeats:
        description: "Read benchmark repeats"
        required: false
        default: "2"
      transform_repeats:
        description: "Transform benchmark repeats"
        required: false
        default: "2"
      country:
        description: "Country scope for transform gate"
        required: false
        default: "德国"
      min_read_speedup:
        description: "Minimum projection-vs-full speedup"
        required: false
        default: "2.0"
      min_transform_speedup_sum:
        description: "Minimum transform speedup for sum mode"
        required: false
        default: "20.0"
      min_transform_speedup_group:
        description: "Minimum transform speedup for grouped mode"
        required: false
        default: "10.0"

jobs:
  nightly-performance-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly performance gate
        run: |
          READ_REPEATS="${{ github.event.inputs.read_repeats || '2' }}"
          TRANSFORM_REPEATS="${{ github.event.inputs.transform_repeats || '2' }}"
          COUNTRY="${{ github.event.inputs.country || '德国' }}"
          MIN_READ_SPEEDUP="${{ github.event.inputs.min_read_speedup || '2.0' }}"
          MIN_TRANSFORM_SPEEDUP_SUM="${{ github.event.inputs.min_transform_speedup_sum || '20.0' }}"
          MIN_TRANSFORM_SPEEDUP_GROUP="${{ github.event.inputs.min_transform_speedup_group || '10.0' }}"

          python 03_Scripts/ci_nightly_performance_check.py \
            --read-repeats "${READ_REPEATS}" \
            --transform-repeats "${TRANSFORM_REPEATS}" \
            --country "${COUNTRY}" \
            --min-read-speedup "${MIN_READ_SPEEDUP}" \
            --min-transform-speedup-sum "${MIN_TRANSFORM_SPEEDUP_SUM}" \
            --min-transform-speedup-group "${MIN_TRANSFORM_SPEEDUP_GROUP}" \
            --skip-if-missing-dataset
