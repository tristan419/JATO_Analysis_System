services:
  jato-dashboard:
    image: ${JATO_IMAGE:-jato-dashboard:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jato-dashboard
    restart: unless-stopped
    ports:
      - "${JATO_HOST_PORT:-8501}:8501"
    environment:
      JATO_PARTITIONED_PATH: ${JATO_PARTITIONED_PATH:-/data/04_Processed_data/partitioned_dataset_v1}
      JATO_PARQUET_PATH: ${JATO_PARQUET_PATH:-/data/04_Processed_data/jato_full_archive.parquet}
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ${JATO_DATA_ROOT:-./04_Processed_data}:/data/04_Processed_data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
